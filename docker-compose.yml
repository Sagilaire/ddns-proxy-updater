services:
  backend:
    build:
      context: ./backend
    image: ddns-updater-backend:local
    container_name: ddns-backend
    restart: unless-stopped
    environment:
      PORT: "4010"
      HOST: "0.0.0.0"
      LOG_LEVEL: "info"
      # Set a strong admin password (or leave it empty to generate one at first boot).
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # Sets the JWT secret used to sign tokens. If empty, the backend derives it
      # from the admin password hash automatically (recommended).
      JWT_SECRET: "${JWT_SECRET:-}"
      TOKEN_TTL_SECONDS: "86400"
      DEFAULT_PERIOD_SECONDS: "300"
      MIN_PERIOD_SECONDS: "30"
      IP_PROVIDERS: "https://api.ipify.org,https://ifconfig.me/all,https://icanhazip.com"
    volumes:
      - ddns-data:/app/data
    networks:
      - ddns-net
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    image: ddns-updater-frontend:local
    container_name: ddns-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3010:3010"
    networks:
      - ddns-net

networks:
  ddns-net:
    driver: bridge

volumes:
  ddns-data:
