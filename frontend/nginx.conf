server {
    listen 3010 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sensible security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse proxy the backend API so the SPA stays same-origin.
    # /api/* -> backend:4010 (resolved via docker DNS inside the compose network)
    location /api/ {
        proxy_pass         http://backend:4010/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Don't buffer large bodies
        client_max_body_size 256k;
        proxy_read_timeout 60s;
    }

    # SPA fallback: any non-asset path returns index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed JS/CSS assets.
    location ~* \.(?:js|css|woff2?|ttf|ico|png|jpg|jpeg|svg|gif)$ {
        try_files $uri =404;
        expires 30d;
        access_log off;
    }
}
